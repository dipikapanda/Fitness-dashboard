 <!DOCTYPE html>
<html>
<head>
    <title>Fitness Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Fitness Progress Dashboard</h1>

    <div class="card">
        <h2>Steps</h2>
        <p id="steps">8000</p>
    </div>

    <div class="card">
        <h2>Calories Burned</h2>
        <p id="calories">450</p>
    </div>

    <div class="card">
        <h2>Water Intake</h2>
        <p id="water">2.5 L</p>
    </div>

    <button onclick="updateData()">Update Progress</button>
</div>

<script src="script.js"></script>
</body>
</html>
